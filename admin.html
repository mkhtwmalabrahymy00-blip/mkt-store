<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم MKT Store</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

<!-- تسجيل الدخول -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="stamp-mini">MKT</div>
    <h2 style="margin:0 0 4px;">لوحة التحكم</h2>
    <p style="font-size:13px;color:#8a7d95;margin:0 0 18px;">سجّل الدخول لإدارة المنتجات</p>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <p id="loginError" style="color:#b23;font-size:12px;margin:0 0 10px;"></p>
    <button class="btn-primary" id="loginBtn">دخول</button>
  </div>
</div>

<!-- لوحة التحكم -->
<div class="hidden" id="adminWrap">
  <div class="admin-header">
    <div class="name" style="font-weight:900;">لوحة MKT Store</div>
    <button class="btn-outline" id="logoutBtn" style="color:#fff;border-color:#fff;">خروج</button>
  </div>

  <div class="admin-wrap">

    <div class="admin-card hidden" id="formPanel">
      <h3 id="formTitle" style="margin:0 0 14px;">إضافة منتج جديد</h3>
      <div id="productForm">
        <div class="field">
          <label>اسم المنتج</label>
          <input type="text" id="pName" placeholder="مثال: قميص قطن رجالي">
        </div>
        <div class="field">
          <label>السعر (جنيه سوداني)</label>
          <input type="number" id="pPrice" placeholder="15000">
        </div>
        <div class="field">
          <label>القسم</label>
          <input type="text" id="pCategory" placeholder="مثال: ملابس رجالية">
        </div>
        <div class="field">
          <label>رابط صورة المنتج</label>
          <input type="text" id="pImage" placeholder="الصق رابط الصورة هنا">
        </div>
        <div class="field">
          <label>وصف المنتج</label>
          <textarea id="pDesc" placeholder="تفاصيل قصيرة عن المنتج"></textarea>
        </div>
        <div class="field">
          <label>ختم/شارة (اختياري)</label>
          <input type="text" id="pBadge" placeholder="مثال: جديد، الأكثر مبيعاً">
        </div>
        <button class="btn-primary" id="saveProductBtn">حفظ المنتج</button>
        <button class="btn-outline" id="cancelFormBtn" style="width:100%;margin-top:8px;">إلغاء</button>
      </div>
    </div>

    <button class="btn-primary" id="openAddFormBtn" style="margin-bottom:16px;">+ إضافة منتج</button>

    <div class="admin-card">
      <h3 style="margin:0 0 10px;">المنتجات الحالية</h3>
      <div id="adminProductList"></div>
    </div>

  </div>
</div>

<div class="toast" id="adminToastEl"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
